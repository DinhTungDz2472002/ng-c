<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thiệp mời • Khánh Ngọc</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#070A0F;
      --bg1:#0B1020;

      --paper:#F7F2EA;
      --paper2:#FFFDF8;

      --ink:#1A1410;
      --muted:#60584F;

      --wine:#7B1E27;
      --rose:#B44B55;
      --gold:#C8AD7F;

      --glow: rgba(180, 75, 85, .25);
      --shadow: 0 26px 70px rgba(0,0,0,.45);
      --shadow2: 0 14px 30px rgba(0,0,0,.18);

      --line: rgba(0,0,0,.10);
      --line2: rgba(123, 30, 39, .48);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      background:
        radial-gradient(1100px 700px at 35% 20%, rgba(180,75,85,.20), transparent 60%),
        radial-gradient(900px 600px at 70% 75%, rgba(200,173,127,.18), transparent 58%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: var(--ink);
      overflow:hidden;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }

    /* layout: 2 bên tối, giữa giấy */
    .app{
      height:100svh;
      display:grid;
      grid-template-columns: 1fr min(590px, 92vw) 1fr;
    }
    .side{
      background:
        radial-gradient(700px 420px at 50% 35%, rgba(255,255,255,.07), transparent 65%),
        radial-gradient(520px 320px at 35% 70%, rgba(200,173,127,.08), transparent 65%);
      filter:saturate(1.05);
    }

    .stage{
      position:relative;
      height:100svh;
      background:
        radial-gradient(800px 560px at 20% 10%, rgba(180,75,85,.08), transparent 55%),
        linear-gradient(180deg, var(--paper2), var(--paper));
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    /* paper grain */
    .stage::after{
      content:"";
      position:absolute; inset:-30px;
      background-image: url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'>\
<filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/></filter>\
<rect width='320' height='320' filter='url(%23n)' opacity='.22'/>\
</svg>");
      background-size: 320px 320px;
      opacity:.38;
      mix-blend-mode:multiply;
      pointer-events:none;
    }

    /* subtle ornament */
    .orn{
      position:absolute; inset:-60px;
      pointer-events:none;
      opacity:.35;
      background:
        radial-gradient(520px 220px at 50% 8%, rgba(200,173,127,.35), transparent 65%),
        radial-gradient(420px 220px at 14% 35%, rgba(180,75,85,.18), transparent 60%),
        radial-gradient(520px 260px at 88% 40%, rgba(180,75,85,.12), transparent 60%);
      filter: blur(.2px);
      z-index:1;
    }

    /* pages */
    .pages{ position:absolute; inset:0; z-index:2; }
    .page{
      position:absolute; inset:0;
      display:grid; place-items:center;
      opacity:0;
      transform: translateX(14px) scale(.988);
      pointer-events:none;
      transition: opacity .42s ease, transform .56s cubic-bezier(.2,.9,.2,1);
    }
    .page.active{
      opacity:1;
      transform: translateX(0) scale(1);
      pointer-events:auto;
    }
    .page.exit-left{ opacity:0; transform: translateX(-22px) scale(.988); }
    .page.exit-right{ opacity:0; transform: translateX(22px) scale(.988); }

    /* top controls */
    .float{
      position:absolute; top:12px; right:12px;
      display:flex; gap:8px;
      z-index:6;
    }
    .pill{
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,.10);
      background: rgba(255,255,255,.68);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 20px rgba(0,0,0,.10);
      cursor:pointer;
      font-weight: 800;
      font-size: 12px;
      color: rgba(0,0,0,.80);
    }

    /* bottom nav */
    .nav{
      position:absolute; left:0; right:0; bottom:0;
      height: 60px;
      display:flex; align-items:center; justify-content:space-between;
      padding: 0 14px;
      z-index:7;
      color: rgba(255,255,255,.92);
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.25));
      backdrop-filter: blur(10px);
    }
    .btn{
      width: 40px; height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color:#fff;
      display:grid;
      place-items:center;
      cursor:pointer;
      transition: .15s ease;
      font-weight: 900;
      font-size: 18px;
    }
    .btn:hover{ background: rgba(255,255,255,.12); transform: translateY(-1px); }
    .btn:active{ transform: translateY(0px) scale(.98); }
    .ratio{ font-weight: 900; opacity:.95; }

    .progress{
      position:absolute; left:0; right:0;
      bottom: 60px; height: 4px;
      background: rgba(0,0,0,.10);
      z-index:7;
    }
    .bar{
      height:100%;
      width: 20%;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      box-shadow: 0 0 0 6px rgba(180,75,85,.08);
      transition: width .25s ease;
    }

    /* ===== Envelope scene ===== */
    .scene{
      width: 92%;
      height: 86%;
      display:grid;
      place-items:center;
      position:relative;
      padding-bottom: 64px;
    }

    .envelope{
      width: min(450px, 94%);
      height: 285px;
      position:relative;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,.22));
      transform: translateZ(0);
    }

    .env-body{
      position:absolute; inset:0;
      border-radius: 12px 12px 20px 20px;
      background:
        radial-gradient(240px 170px at 22% 20%, rgba(255,255,255,.55), transparent 60%),
        linear-gradient(180deg, #F0E7DB, #E8DDCE);
      border: 1px solid var(--line);
      overflow:hidden;
    }
    .env-body::before{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(135deg, transparent 0 42%, rgba(0,0,0,.055) 42% 43%, transparent 43% 100%),
        linear-gradient(225deg, transparent 0 42%, rgba(0,0,0,.055) 42% 43%, transparent 43% 100%);
      opacity:.26;
      mix-blend-mode:multiply;
      pointer-events:none;
    }

    .env-flap{
      position:absolute; left:0; right:0; top:0;
      height: 66%;
      transform-origin: 50% 0%;
      background:
        radial-gradient(220px 140px at 50% 18%, rgba(255,255,255,.50), transparent 70%),
        linear-gradient(180deg, #F5EFE6, #E9DFD1);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      border-top: 1px solid rgba(0,0,0,.08);
      filter: drop-shadow(0 12px 16px rgba(0,0,0,.10));
      transform: rotateX(0deg);
    }

    /* wax seal */
    .seal{
      position:absolute; left:50%; top: 60%;
      transform: translate(-50%,-50%) scale(1);
      width: 52px; height: 52px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.25), transparent 48%),
        radial-gradient(circle at 50% 60%, rgba(0,0,0,.12), transparent 56%),
        linear-gradient(180deg, #8B1F2A, var(--wine));
      border: 1px solid rgba(0,0,0,.18);
      box-shadow: 0 18px 30px rgba(0,0,0,.25);
      cursor:pointer;
      transition: transform .2s ease;
    }
    .seal:active{ transform: translate(-50%,-50%) scale(.96); }
    .seal::after{
      content:"KN";
      position:absolute; inset:0;
      display:grid; place-items:center;
      font-family: "Cormorant Garamond", serif;
      font-weight: 800;
      letter-spacing:.8px;
      color: rgba(255,255,255,.90);
      text-shadow: 0 10px 18px rgba(0,0,0,.25);
      font-size: 16px;
      opacity:.95;
    }

    /* letter (card inside) */
    .letter{
      position:absolute;
      left: 18px; right: 18px;
      bottom: 18px;
      height: 330px;
      border-radius: 16px;
      background:
        radial-gradient(220px 140px at 18% 10%, rgba(200,173,127,.18), transparent 60%),
        linear-gradient(180deg, #FFFFFF, #F7F1E8);
      border: 1px solid rgba(0,0,0,.10);
      box-shadow: var(--shadow2);
      overflow:hidden;
      padding: 20px 18px;
      transform: translateY(135px);
      opacity:0;
    }

    .frame{
      position:absolute; inset:14px;
      border-radius: 16px;
      border: 2px solid var(--line2);
      pointer-events:none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.55);
    }

    /* --- name mềm mại trang 1 --- */
    .soft-name{
      margin: 6px 0 2px;
      text-align:center;
      font-family: "Great Vibes", cursive;
      font-size: 56px;
      font-weight: 400;
      color: rgba(123,30,39,.95);
      text-shadow:
        0 14px 30px rgba(123,30,39,.18),
        0 6px 18px rgba(0,0,0,.10);
      letter-spacing:.2px;
    }
    .soft-sub{
      margin: 0 0 10px;
      text-align:center;
      font-family: "Cormorant Garamond", serif;
      font-size: 14px;
      font-weight: 700;
      color: rgba(26,20,16,.70);
      letter-spacing:.28em;
      text-transform: uppercase;
    }

    .letter p{
      margin: 10px 0 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 14px;
      line-height: 1.6;
      color: #3E352B;
      padding: 0 10px;
      text-align:center;
    }

    /* open animations */
    .envelope.animating .seal{
      animation: sealPop .55s cubic-bezier(.2,.9,.2,1) forwards;
    }
    @keyframes sealPop{
      0%{ transform: translate(-50%,-50%) scale(1); opacity:1; }
      55%{ transform: translate(-50%,-84%) scale(1.08) rotate(10deg); opacity:1; }
      100%{ transform: translate(-50%,-130%) scale(.86) rotate(18deg); opacity:0; }
    }
    .envelope.open .env-flap{
      animation: flapOpen .85s cubic-bezier(.2,.9,.2,1) forwards .08s;
    }
    @keyframes flapOpen{
      0%{ transform: rotateX(0deg); }
      100%{ transform: rotateX(170deg); }
    }
    .envelope.open .letter{
      animation: letterUp .95s cubic-bezier(.2,.9,.2,1) forwards .18s;
    }
    @keyframes letterUp{
      0%{ transform: translateY(135px); opacity:0; }
      45%{ opacity:1; }
      100%{ transform: translateY(-48px); opacity:1; }
    }

    /* ===== Page 3: full invite ===== */
    .invite{
      width: 92%;
      height: 90%;
      display:grid;
      grid-template-columns: 1.08fr .92fr;
      gap: 14px;
      padding: 18px 14px;
    }

    .card{
      position:relative;
      background:
        radial-gradient(260px 160px at 20% 10%, rgba(200,173,127,.16), transparent 60%),
        linear-gradient(180deg, #FFFFFF, #F7F1E8);
      border: 1px solid rgba(0,0,0,.10);
      border-radius: 16px;
      box-shadow: var(--shadow2);
      overflow:hidden;
    }
    .card .inner{ position:relative; padding: 18px 18px 12px; }

    .title{
      text-align:center;
      margin: 6px 0 10px;
    }
    .title .a{
      font-family: "Cormorant Garamond", serif;
      font-weight: 800;
      font-size: 20px;
      color: rgba(123,30,39,.95);
      letter-spacing:.18px;
    }
    .title .b{
      font-family: "Great Vibes", cursive;
      font-weight: 400;
      font-size: 40px;
      color: var(--wine);
      margin-top: 2px;
    }

    .para{
      font-family: "Cormorant Garamond", serif;
      font-size: 14px;
      line-height: 1.65;
      color:#3E352B;
      margin: 10px 0 12px;
      padding: 0 6px;
      text-align:center;
    }

    .meta{
      display:grid;
      gap: 8px;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.08);
      background: rgba(255,255,255,.55);
      backdrop-filter: blur(8px);
    }
    .meta .line{
      display:flex; gap:10px; align-items:center;
      font-family: "Cormorant Garamond", serif;
      color:#3E352B;
      font-size: 14px;
      font-weight: 600;
    }
    .ico{
      width: 22px; height:22px;
      border-radius: 8px;
      display:grid; place-items:center;
      background: rgba(123,30,39,.08);
      border: 1px solid rgba(123,30,39,.16);
      color: rgba(123,30,39,.95);
      font-size: 13px;
    }

    .cal{
      margin-top: 12px;
      padding-top: 8px;
    }
    .month{
      text-align:center;
      font-family: "Cormorant Garamond", serif;
      font-weight: 800;
      color: rgba(123,30,39,.95);
      letter-spacing:.2px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    .gridcal{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
      font-family: Inter, system-ui;
      font-size: 11px;
      color:#2a241d;
      padding: 0 4px;
    }
    .dow{ opacity:.55; text-align:center; padding:4px 0; font-weight:700; }
    .d{
      text-align:center;
      padding: 7px 0;
      border-radius: 12px;
      background: rgba(0,0,0,.03);
      border: 1px solid rgba(0,0,0,.06);
      position:relative;
    }
    .d.dim{ opacity:.32; }
    .d.target{
      background: rgba(123,30,39,.08);
      border-color: rgba(123,30,39,.22);
    }
    .d.target::after{
      content:"";
      position:absolute;
      left:50%; top:50%;
      transform: translate(-50%,-50%);
      width: 24px; height: 24px;
      border-radius: 999px;
      border: 2px solid rgba(123,30,39,.88);
      box-shadow: 0 0 0 7px rgba(123,30,39,.10);
    }

    /* right column */
    .right{
      display:grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .badge{
      position:relative;
      border-radius: 16px;
      padding: 14px 14px 16px;
      background:
        radial-gradient(260px 140px at 25% 25%, rgba(255,255,255,.16), transparent 65%),
        linear-gradient(180deg, rgba(123,30,39,.95), rgba(123,30,39,.86));
      color:#fff;
      box-shadow: 0 18px 30px rgba(0,0,0,.18);
      overflow:hidden;
    }
    .badge::after{
      content:"";
      position:absolute; inset:-60px;
      background: radial-gradient(360px 180px at 20% 40%, rgba(200,173,127,.22), transparent 60%);
      transform: rotate(8deg);
      pointer-events:none;
      opacity:.9;
    }
    .badge .t1{
      position:relative;
      font-family:"Cormorant Garamond", serif;
      font-weight: 700;
      opacity:.92;
      letter-spacing:.2px;
    }
    .badge .t2{
      position:relative;
      margin-top: 6px;
      font-family:"Great Vibes", cursive;
      font-weight: 400;
      font-size: 42px;
      line-height: .95;
    }
    .badge .t3{
      position:relative;
      margin-top: 8px;
      font-weight: 800;
      opacity:.92;
      font-size: 12px;
      letter-spacing:.4px;
    }

    .board{
      position:relative;
      border-radius: 16px;
      background:
        radial-gradient(300px 180px at 20% 12%, rgba(200,173,127,.18), transparent 60%),
        linear-gradient(180deg, #FFFDF8, #F4EEE4);
      border: 1px solid rgba(0,0,0,.10);
      box-shadow: var(--shadow2);
      overflow:hidden;
      min-height: 340px;
    }

    .polaroid{
      position:absolute;
      width: 155px; height: 190px;
      background:#fff;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,.08);
      box-shadow: 0 14px 26px rgba(0,0,0,.18);
      padding: 10px 10px 22px;
      transform: rotate(var(--rot));
    }
    .polaroid .img{
      width:100%; height:100%;
      border-radius: 8px;
      background: #ddd center/cover no-repeat;
    }
    .pA{ left: 16px; top: 18px; --rot:-8deg; }
    .pB{ right: 16px; top: 60px; --rot:7deg; }
    .pC{ left: 50%; bottom: 14px; transform: translateX(-50%) rotate(-2deg); width: 220px; height: 140px; padding-bottom: 18px; }

    /* page 4 gallery placeholders */
    .gallery{
      position:absolute;
      inset: 14px;
      border-radius: 16px;
      padding: 18px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
    }
    .ph{
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,.10);
      background:
        radial-gradient(180px 120px at 20% 20%, rgba(200,173,127,.22), transparent 65%),
        linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.35));
      box-shadow: 0 14px 26px rgba(0,0,0,.14);
      overflow:hidden;
      position:relative;
    }
    .ph::after{
      content:"";
      position:absolute; inset: 0;
      background:
        linear-gradient(135deg, rgba(123,30,39,.10), transparent 55%),
        radial-gradient(260px 180px at 75% 20%, rgba(180,75,85,.18), transparent 60%);
      opacity:.8;
      pointer-events:none;
    }
    .ph .img{
      width:100%; height:100%;
      background: #ddd center/cover no-repeat;
      filter: saturate(1.05);
    }
    .ph.tag{
      position:absolute;
      left: 14px; bottom: 14px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(0,0,0,.45);
      color:#fff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing:.2px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.16);
    }

    /* small signature */
    .sig{
      position:absolute;
      left: 18px; right: 18px; bottom: 12px;
      text-align:center;
      font-family:"Great Vibes", cursive;
      color: rgba(123,30,39,.55);
      font-size: 28px;
      pointer-events:none;
      opacity:.7;
    }

    /* responsive */
    @media (max-width: 560px){
      .invite{ grid-template-columns: 1fr; height: 92%; }
      .board{ min-height: 300px; }
      .pC{ width: 210px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="side"></div>

    <main class="stage" id="stage">
      <div class="orn"></div>

      <div class="float">
        <div class="pill" id="btnMusic">🔊 Nhạc</div>
        <div class="pill" id="btnNext">››</div>
      </div>

      <section class="pages" id="pages">
        <!-- PAGE 1 -->
        <div class="page active" data-page="1">
          <div class="scene">
            <div class="envelope" id="env1">
              <div class="env-body"></div>
              <div class="env-flap"></div>
              <div class="seal" data-open="env1" title="Bấm để mở"></div>

              <div class="letter">
                <div class="frame"></div>
                <div class="soft-sub">Invitation</div>
                <div class="soft-name" id="cfgNameCover"></div>
                <p id="coverText"></p>
              </div>
            </div>
          </div>
        </div>

        <!-- PAGE 2 -->
        <div class="page" data-page="2">
          <div class="scene">
            <div class="envelope open" id="env2">
              <div class="env-body"></div>
              <div class="env-flap"></div>
              <div class="seal" data-open="env2" title="✨"></div>

              <div class="letter" style="opacity:1; transform: translateY(-48px);">
                <div class="frame"></div>
                <div class="soft-sub">For You</div>
                <div class="soft-name">Hẹn gặp nhé</div>
                <p id="introText"></p>
              </div>
            </div>
          </div>
        </div>

        <!-- PAGE 3 -->
        <div class="page" data-page="3">
          <div class="invite">
            <div class="card">
              <div class="frame"></div>
              <div class="inner">
                <div class="title">
                  <div class="a">INVITATION</div>
                  <div class="b" id="cfgName2"></div>
                </div>

                <p class="para" id="letterText"></p>

                <div class="meta">
                  <div class="line"><span class="ico">⏰</span><span id="metaTime"></span></div>
                  <div class="line"><span class="ico">📍</span><span id="metaPlace"></span></div>
                  <div class="line"><span class="ico">📅</span><span id="metaDate"></span></div>
                </div>

                <div class="cal">
                  <div class="month" id="calMonthTitle"></div>
                  <div class="gridcal" id="calGrid"></div>
                </div>
              </div>
            </div>

            <div class="right">
              <div class="badge">
                <div class="t1">Dear my friends</div>
                <div class="t2">Thank you</div>
                <div class="t3">See you on <span id="metaDate2"></span></div>
              </div>

              <div class="board">
                <div class="polaroid pA"><div class="img" id="avatar"></div></div>
                <div class="polaroid pB"><div class="img" id="ph1"></div></div>
                <div class="polaroid pC"><div class="img" id="ph2"></div></div>
                <div class="sig" id="sigName"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- PAGE 4 (GALLERY PLACEHOLDERS) -->
        <div class="page" data-page="4">
          <div class="scene">
            <div class="envelope open" id="env4">
              <div class="env-body"></div>
              <div class="env-flap"></div>
              <div class="seal" data-open="env4"></div>

              <div class="letter" style="opacity:1; transform: translateY(-48px);">
                <div class="frame"></div>

                <div class="gallery">
                  <div class="ph">
                    <div class="img" id="g1"></div>
                    <div class="ph tag">Ảnh 1</div>
                  </div>
                  <div class="ph">
                    <div class="img" id="g2"></div>
                    <div class="ph tag">Ảnh 2</div>
                  </div>
                  <div class="ph">
                    <div class="img" id="g3"></div>
                    <div class="ph tag">Ảnh 3</div>
                  </div>
                  <div class="ph">
                    <div class="img" id="g4"></div>
                    <div class="ph tag">Ảnh 4</div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>

        <!-- PAGE 5 -->
        <div class="page" data-page="5">
          <div class="scene">
            <div class="envelope" id="env5">
              <div class="env-body"></div>
              <div class="env-flap"></div>
              <div class="seal" data-open="env5"></div>

              <div class="letter">
                <div class="frame"></div>
                <div class="soft-sub">Thank You</div>
                <div class="soft-name">Hẹn gặp lại</div>
                <p>Nhấn mũi tên để xem lại từ đầu.</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="progress"><div class="bar" id="bar"></div></div>

      <footer class="nav">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="btn" id="prev">‹</div>
          <div class="ratio" id="ratio">1 / 5</div>
          <div class="btn" id="next">›</div>
        </div>
        <div style="opacity:.85;font-weight:900;font-size:12px;letter-spacing:.2px;">Tap để chuyển</div>
      </footer>

      <audio id="audio" preload="auto" loop>
        <source src="music.mp3" type="audio/mpeg">
      </audio>
    </main>

    <div class="side"></div>
  </div>

  <script>
    // ================= CONFIG (CHỈ SỬA Ở ĐÂY) =================
    const CONFIG = {
      name: "Khánh Ngọc",
      dateISO: "2026-03-01",      // YYYY-MM-DD
      timeStart: "09:00",
      timeEnd: "11:30",
      place: "Sân trường / Studio (bạn sửa lại)",
      // Ảnh tạm trên mạng (Unsplash). Sau bạn thay bằng ảnh của bạn:
      // - Nếu dùng file cục bộ: "avatar.jpg" / "photo1.jpg"...
      images: {
        avatar: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=900&q=80",
        photo1:  "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=900&q=80",
        photo2:  "https://images.unsplash.com/photo-1520975958225-1d44b3d2a3b2?auto=format&fit=crop&w=1200&q=80"
      }
    };

    const $ = (s)=>document.querySelector(s);
    const $$ = (s)=>Array.from(document.querySelectorAll(s));

    // ================= Pages (story-like) =================
    const pages = $$("#pages .page");
    let idx = 0;
    let transitioning = false;

    function setBar(){
      $("#ratio").textContent = `${idx+1} / ${pages.length}`;
      $("#bar").style.width = `${((idx+1)/pages.length)*100}%`;
    }

    function go(nextIdx, dir = "right"){
      if(transitioning) return;
      transitioning = true;

      const cur = pages[idx];
      const nxt = pages[nextIdx];

      cur.classList.remove("active");
      cur.classList.add(dir === "right" ? "exit-left" : "exit-right");
      nxt.classList.add("active");

      setTimeout(()=>{
        cur.classList.remove("exit-left","exit-right");
        idx = nextIdx;
        setBar();
        transitioning = false;
      }, 520);
    }

    function next(){
      primeAudio();
      const n = (idx + 1) % pages.length;
      go(n, "right");
    }
    function prev(){
      primeAudio();
      const n = (idx - 1 + pages.length) % pages.length;
      go(n, "left");
    }

    $("#next").addEventListener("click", next);
    $("#prev").addEventListener("click", prev);
    $("#btnNext").addEventListener("click", next);

    window.addEventListener("keydown",(e)=>{
      if(e.key==="ArrowRight") next();
      if(e.key==="ArrowLeft") prev();
    });

    // Tap anywhere to go next (nhưng giữ page1 chưa mở thì không tự next)
    $("#stage").addEventListener("click",(e)=>{
      if(e.target.closest(".seal") || e.target.closest(".pill") || e.target.closest(".btn")) return;
      if(idx === 0 && !$("#env1").classList.contains("open")) return;
      next();
    });

    // ================= Envelope open =================
    function openEnvelope(envId, autoNextDelay=820){
      const env = document.getElementById(envId);
      if(!env) return;
      if(env.classList.contains("open")) return;

      env.classList.add("animating");
      setTimeout(()=> env.classList.add("open"), 120);

      setTimeout(()=>{
        env.classList.remove("animating");
        if(envId === "env1") next();
        if(envId === "env4") env.classList.add("open");
      }, autoNextDelay);
    }

    document.addEventListener("click",(e)=>{
      const seal = e.target.closest(".seal");
      if(!seal) return;

      primeAudio(true);
      const envId = seal.getAttribute("data-open");

      if(envId === "env1") openEnvelope("env1", 920);
      else if(envId === "env4") openEnvelope("env4", 920);
      else if(envId === "env5") go(0, "left");
    });

    // ================= Content =================
    $("#cfgNameCover").textContent = CONFIG.name;
    $("#cfgName2").textContent = CONFIG.name;
    $("#sigName").textContent = CONFIG.name;

    const d = new Date(CONFIG.dateISO + "T00:00:00");
    const dd = String(d.getDate()).padStart(2,"0");
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const yyyy = d.getFullYear();

    const cover = `Mời bạn mở phong bì để xem thiệp nhé.`;
    const intro = `Mình mời bạn tham dự buổi chụp kỉ yếu để lưu lại những khoảnh khắc thật đẹp cùng nhau.`;
    const full =
`Chào bạn 🌷
Chúng ta sắp khép lại một chặng đường thật nhiều kỷ niệm.
Mình mời bạn tham dự buổi chụp kỉ yếu để cùng lưu giữ những khoảnh khắc đẹp nhất.
Sự có mặt của bạn sẽ làm ngày hôm đó ý nghĩa hơn rất nhiều.`;

    $("#coverText").textContent = cover;
    $("#introText").textContent = intro;
    $("#letterText").textContent = full;

    $("#metaTime").textContent = `${CONFIG.timeStart} – ${CONFIG.timeEnd}`;
    $("#metaPlace").textContent = CONFIG.place;
    $("#metaDate").textContent = `${dd}/${mm}/${yyyy}`;
    $("#metaDate2").textContent = `${dd}/${mm}/${yyyy}`;

    // ================= Images =================
    function setBg(id, url){
      const el = document.getElementById(id);
      if(!el) return;
      el.style.backgroundImage = `url('${url}')`;
      el.style.backgroundSize = "cover";
      el.style.backgroundPosition = "center";
    }

    // Page 3
    setBg("avatar", CONFIG.images.avatar);
    setBg("ph1", CONFIG.images.photo1);
    setBg("ph2", CONFIG.images.photo2);

    // Page 4 placeholders (ảnh tạm để bạn thay sau)
    setBg("g1", "https://images.unsplash.com/photo-1520975682031-a6ad7f0d1c59?auto=format&fit=crop&w=1200&q=80");
    setBg("g2", "https://images.unsplash.com/photo-1520975958225-1d44b3d2a3b2?auto=format&fit=crop&w=1200&q=80");
    setBg("g3", "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=1200&q=80");
    setBg("g4", "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=1200&q=80");

    // ================= Calendar (auto month title + circle target date) =================
    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    function buildCalendar(year, month0, targetISO){
      const target = new Date(targetISO + "T00:00:00");
      const first = new Date(year, month0, 1);
      const firstDow = first.getDay();
      const daysInMonth = new Date(year, month0+1, 0).getDate();
      const prevDays = new Date(year, month0, 0).getDate();

      $("#calMonthTitle").textContent = `${monthNames[month0]} ${year}`;

      const grid = $("#calGrid");
      grid.innerHTML = "";

      ["S","M","T","W","T","F","S"].forEach(x=>{
        const div = document.createElement("div");
        div.className = "dow";
        div.textContent = x;
        grid.appendChild(div);
      });

      for(let i=0;i<42;i++){
        const dayNum = i - firstDow + 1;
        let display = dayNum;
        let dim = false;

        if(dayNum < 1){ display = prevDays + dayNum; dim = true; }
        if(dayNum > daysInMonth){ display = dayNum - daysInMonth; dim = true; }

        const cell = document.createElement("div");
        cell.className = "d" + (dim ? " dim" : "");
        cell.textContent = display;

        if(!dim){
          const cur = new Date(year, month0, dayNum);
          if(cur.getFullYear()===target.getFullYear() &&
             cur.getMonth()===target.getMonth() &&
             cur.getDate()===target.getDate()){
            cell.classList.add("target");
          }
        }
        grid.appendChild(cell);
      }
    }
    buildCalendar(yyyy, d.getMonth(), CONFIG.dateISO);

    // ================= Music =================
    const audio = $("#audio");
    let musicOn = false;

    async function primeAudio(){
      if(!musicOn) return;
      try{ await audio.play(); }catch(e){}
    }

    $("#btnMusic").addEventListener("click", async ()=>{
      try{
        if(!musicOn){
          audio.volume = 0.85;
          await audio.play();
          musicOn = true;
          $("#btnMusic").textContent = "⏸ Nhạc";
        }else{
          audio.pause();
          musicOn = false;
          $("#btnMusic").textContent = "🔊 Nhạc";
        }
      }catch(e){}
    });

    // init
    setBar();
  </script>
</body>
</html>
